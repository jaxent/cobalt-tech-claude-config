# ============================================================
# Cobalt Hospitality Tech — Automated PR Review
# Triggered on every pull request open or update.
#
# What this does:
#   1. Runs Claude Code against the PR diff
#   2. Posts review as PR comment
#   3. Fails the check if blocking issues found
#
# EXAM PATTERN: Claude Code non-interactive mode
#   - Uses -p/--print flag for headless execution
#   - --output-format json for structured pipeline output
#   - Session isolation: fresh Claude instance per job
#   - CLAUDE.md auto-loaded for project context
#
# Cost note: Path filtering limits runs to relevant changes.
# Concurrency control prevents parallel runs on same PR.
# ============================================================

name: Cobalt PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # Only run when these paths change
    # Prevents burning tokens on docs-only PRs
    paths:
      - 'src/**'
      - 'CLAUDE.md'
      - '.claude/**'

# Prevent parallel runs on the same PR
# If a new push comes in, cancel the in-progress review
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cobalt-review:
    name: Cobalt Code Review
    runs-on: ubuntu-latest

    # Required permissions for posting PR comments
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      # -------------------------------------------------------
      # Step 1 — Checkout the code
      # fetch-depth: 0 gets full history for accurate diffs
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------------------------------
      # Step 2 — Install Node.js (required for Claude Code)
      # -------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # -------------------------------------------------------
      # Step 3 — Install Claude Code
      # -------------------------------------------------------
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # -------------------------------------------------------
      # Step 4 — Get the PR diff
      # We pass this to Claude so it knows what changed
      # -------------------------------------------------------
      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD \
            -- 'src/**' > pr_diff.txt
          echo "diff_lines=$(wc -l < pr_diff.txt)" >> $GITHUB_OUTPUT

      # -------------------------------------------------------
      # Step 5 — Run Cobalt Review via Claude Code
      # -------------------------------------------------------
      - name: Run Cobalt Review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          chmod +x .github/scripts/ci-review-prompt.sh

          REVIEW_OUTPUT=$(.github/scripts/ci-review-prompt.sh)

          echo "review_output<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          VERDICT=$(echo "$REVIEW_OUTPUT" | python3 .github/scripts/extract-verdict.py)
          echo "verdict=$VERDICT" >> $GITHUB_OUTPUT
          echo "Verdict: $VERDICT"      
      # -------------------------------------------------------
      # Step 6 — Post review as PR comment
      # -------------------------------------------------------
      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const reviewOutput = `${{ steps.review.outputs.review_output }}`;
            const verdict = `${{ steps.review.outputs.verdict }}`;
            
            const verdictEmoji = {
              'APPROVE': '✅',
              'APPROVE_WITH_NOTES': '⚠️',
              'REQUEST_CHANGES': '❌'
            }[verdict] || '⚠️';

            let reviewBody;
            try {
              // Parse the JSON output
              let data = JSON.parse(reviewOutput);
              let review;
              
              if (data.result) {
                const match = data.result.match(/\{[\s\S]*\}/);
                review = match ? JSON.parse(match[0]) : data;
              } else {
                review = data;
              }

              const blocking = review.blocking_issues || [];
              const warnings = review.warnings || [];
              const suggestions = review.suggestions || [];

              let body = `## ${verdictEmoji} Cobalt CI Review — ${verdict}\n\n`;
              body += `**${review.summary || 'Review complete.'}**\n\n`;

              if (blocking.length > 0) {
                body += `### 🔴 Blocking Issues (must fix before merge)\n`;
                blocking.forEach(issue => body += `- ${issue}\n`);
                body += '\n';
              }

              if (warnings.length > 0) {
                body += `### 🟡 Warnings\n`;
                warnings.forEach(w => body += `- ${w}\n`);
                body += '\n';
              }

              if (suggestions.length > 0) {
                body += `### 🔵 Suggestions\n`;
                suggestions.forEach(s => body += `- ${s}\n`);
                body += '\n';
              }

              body += `---\n*Cobalt Hospitality Tech automated review • `;
              body += `[CLAUDE.md](../blob/main/CLAUDE.md)*`;
              reviewBody = body;

            } catch (e) {
              reviewBody = `## Cobalt CI Review\n\nReview completed. `;
              reviewBody += `See Actions log for details.\n\nVerdict: ${verdict}`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: reviewBody
            });

      # -------------------------------------------------------
      # Step 7 — Fail the check if blocking issues found
      # REQUEST_CHANGES verdict blocks the PR
      # -------------------------------------------------------
      - name: Enforce verdict
        if: steps.review.outputs.verdict == 'REQUEST_CHANGES'
        run: |
          echo "❌ Blocking issues found. PR cannot be merged."
          echo "See the review comment for details."
          exit 1